name: Release Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make verification script executable
        run: chmod +x EIK/verify_eik.sh

      - name: Run EIK verification
        run: |
          cd EIK
          bash verify_eik.sh
