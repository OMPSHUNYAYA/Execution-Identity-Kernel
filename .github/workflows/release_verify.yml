name: Release Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' EIK/verify_eik.sh
          sed -i 's/\r$//' EIK/replay_eik.sh
          sed -i 's/\r$//' EIK/run_all_tests.sh

      - name: Make shell scripts executable
        run: |
          chmod +x EIK/verify_eik.sh
          chmod +x EIK/replay_eik.sh
          chmod +x EIK/run_all_tests.sh

      - name: Run EIK verification
        run: |
          cd EIK
          bash verify_eik.sh
